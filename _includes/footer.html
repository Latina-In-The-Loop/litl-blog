<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">Latina in the Loop</div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        {% if site.substack %}
          <a href="{{ site.substack }}" target="_blank" rel="noopener noreferrer">Substack</a>
        {% endif %}
        {% if site.linkedin %}
          <a href="{{ site.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        {% endif %}
        {% if site.twitter %}
          <a href="https://twitter.com/{{ site.twitter }}" target="_blank" rel="noopener noreferrer">Twitter</a>
        {% endif %}
      </nav>
      <p class="footer-copy">
        &copy; {{ 'now' | date: "%Y" }} Latina in the Loop &mdash;
        <a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a>
      </p>
    </div>
  </div>
</footer>
